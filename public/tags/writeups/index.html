<!DOCTYPE html>
<html lang="en">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=55623&amp;path=livereload" data-no-instant defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writeups | Titus Kamau</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Code', 'Courier New', 'Consolas', monospace;
            background: #03050b;
            color: #c0d9e8;
            line-height: 1.6;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(3, 5, 11, 0.95);
            border-bottom: 1px solid #2ecc7140;
        }

        .logo { font-size: 1.2rem; font-weight: 600; color: #2ecc71; }
        .nav-links { display: flex; gap: 2rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #7a8b9e; transition: all 0.2s; font-size: 0.85rem; }
        .nav-links a:hover { color: #2ecc71; }

        .clock {
            font-family: monospace;
            font-size: 0.9rem;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            border: 1px solid #2ecc7140;
        }

        .page-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: linear-gradient(135deg, #070b14 0%, #0a1020 100%);
            border-left: 3px solid #2ecc71;
            min-height: calc(100vh - 200px);
        }

        .content {
            color: #c0d9e8;
            font-size: 1rem;
            line-height: 1.6;
        }

        .content h1, .content h2, .content h3 {
            color: #2ecc71;
            margin: 1.5rem 0 1rem 0;
        }

        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .content th, .content td {
            border: 1px solid #2ecc7140;
            padding: 0.5rem;
        }

        .content th {
            background: rgba(46, 204, 113, 0.1);
        }

        .content a {
            color: #2ecc71;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #1a2533;
            color: #5a6b7e;
            font-size: 0.65rem;
        }

        .theme-toggle {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Titus Kamau</div>
        <div class="nav-links">
            <a href="/">home</a>
            <a href="/cybersecurity/">projects</a>
            <a href="/reports/">reports</a>
            <a href="/certifications/">certifications</a>
            <a href="/blog/">blog</a>
            <a href="/about/">about</a>
        </div>
        <div id="digitalClock" class="clock"></div>
    </nav>

    <div class="page-container">
        <div class="content">
            
        </div>
    </div>

    <footer class="footer">
        <div>Titus Kamau — "The quieter you become, the more you are able to hear"
        <div style="margin-top: 0.5rem;">© 2026 | Cybersecurity Portfolio</div>
        <div style="margin-top: 0.5rem;">ISC2 CC | TryHackMe Pre-Security | Jr Penetration Tester</div>
        <button id="themeToggle" class="theme-toggle">🌓 Dark/Light</button>
    </footer>

    <script>
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const clockElement = document.getElementById('digitalClock');
            if (clockElement) clockElement.innerHTML = hours + ':' + minutes + ':' + seconds;
        }
        setInterval(updateClock, 1000);
        updateClock();

        
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('light-mode');
                localStorage.setItem('theme', document.documentElement.classList.contains('light-mode') ? 'light' : 'dark');
            });
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        }
    </script>

    <style>
        .light-mode {
            background: #f0f0f0;
            color: #1a1a1a;
        }
        .light-mode .navbar,
        .light-mode .page-container {
            background: #ffffff;
            border-color: #e0e0e0;
        }
        .light-mode .logo,
        .light-mode .nav-links a,
        .light-mode .content h1,
        .light-mode .content h2,
        .light-mode .clock {
            color: #0066cc;
        }
        .light-mode .content {
            color: #333;
        }
        .light-mode .footer {
            border-top-color: #ddd;
        }
    </style>
</body>
</html>
